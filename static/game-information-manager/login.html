<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>sign in</title>
</head>

<body>
    <div align="center">
        <h1>登录界面</h1>

        <form id="loginForm">
            username:<input type="text" id="username" name="username">
            <br>
            password:<input type="password" id="password" name="password">
            <br>
            <input type="submit" value="登录">
        </form>

        <p id="message"></p>

        <script>
            document.getElementById("loginForm").addEventListener("submit", function (event) {
                event.preventDefault();

                var message = document.getElementById("message");
                message.textContent = "";

                fetch("/api/game-information-manager/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value
                    })
                }).then(function (response) {
                    return response.text().then(function (text) {
                        var data = null;

                        try {
                            data = text ? JSON.parse(text) : null;
                        } catch (e) {
                            data = null;
                        }

                        if (response.status === 200) {
                            message.textContent = data && data.message ? data.message : "登录成功";

                            var username = document.getElementById("username").value;

                            sessionStorage.setItem("gameInformationManagerLogin", "true");
                            sessionStorage.setItem("gameInformationManagerXUserName", username);

                            setTimeout(function () {
                                window.location.href = "/game-information-manager/game-information.html";
                            }, 500);
                        } else {
                            message.textContent = data && data.message ? data.message : "登录失败";
                        }
                    });
                }).catch(function () {
                    message.textContent = "服务暂不可用";
                });
            });
        </script>
    </div>
</body>

</html>
