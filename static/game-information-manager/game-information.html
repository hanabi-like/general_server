<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>game information</title>
</head>

<body>
    <div align="center">
        <h1>游戏信息</h1>

        <hr>

        <h2>游戏选择</h2>
        <select id="gameName">
            <option value="" selected disabled>请选择</option>
            <option value="Genshin%20Impact">Genshin Impact</option>
        </select>

        <h2>角色查询</h2>
        <form id="getGameCharacter">
            <input type="submit" value="查询角色">
        </form>
        <div id="GameCharacter"></div>
        <p id="GameCharacterMessage"></p>

        <h2>角色添加</h2>
        region:
        <select id="characterRegion" name="region">
            <option value="" selected disabled>请选择</option>
            <option value="Genshin">原神</option>
            <option value="God">神</option>
            <option value="Nod-Krai">挪德卡莱</option>
            <option value="Mondstadt">蒙德</option>
            <option value="Liyue">璃月</option>
            <option value="Inazuma">稻妻</option>
            <option value="Sumeru">须弥</option>
            <option value="Fontaine">枫丹</option>
            <option value="Natlan">纳塔</option>
        </select>
        <br>

        <h3>当前角色</h3>
        <div id="GameCharacterRegion"></div>
        <p id="GameCharacterRegionMessage"></p>

        <form id="saveGameCharacter">
            name:
            <input type="text" id="characterName" name="name">
            <br>
            sex:
            <select id="characterSex" name="sex">
                <option value="" selected disabled>请选择</option>
                <option value="0">女</option>
                <option value="1">男</option>
            </select>
            <br>
            quality:
            <select id="characterQuality" name="quality">
                <option value="" selected disabled>请选择</option>
                <option value="4">四星</option>
                <option value="5">五星</option>
            </select>
            <br>
            refName:
            <select id="characterRefName" name="refName">
                <option value="" selected disabled>请选择</option>
            </select>
            <br>
            insertPos:
            <select id="characterInsertPos" name="insertPos">
                <option value="" selected disabled>请选择</option>
                <option value="BEFORE">之前</option>
                <option value="AFTER">之后</option>
            </select>
            <br>
            <input type="submit" value="添加角色">
        </form>
        <p id="message"></p>
    </div>

    <script src="/game-information-manager/game-information.js"></script>
</body>

</html>
